name: Order Service CI

on:
  push:
    branches: [main, develop]
    paths:
      - backend/order-service/**
      - .github/workflows/order-service.yml
      - .github/workflows/reusable-java-service-ci.yml
  pull_request:
    branches: [main]
    paths:
      - backend/order-service/**
      - .github/workflows/order-service.yml
      - .github/workflows/reusable-java-service-ci.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  ci:
    uses: ./.github/workflows/reusable-java-service-ci.yml
    with:
      service_name: order-service
      service_path: backend/order-service
      image_name: gocart-order-service
    secrets: inherit
