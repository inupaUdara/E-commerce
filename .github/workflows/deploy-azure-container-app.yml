name: Deploy To Azure Container Apps

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: Image name in GHCR (without registry/owner)
        required: true
        type: choice
        options:
          - gocart-gateway
          - gocart-user-service
          - gocart-store-service
          - gocart-product-service
          - gocart-order-service
          - gocart-notification-service
          - gocart-frontend
      image_tag:
        description: Image tag to deploy (latest or commit SHA)
        required: true
        default: latest
        type: string
      container_app_name:
        description: Existing Azure Container App name
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App image
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ inputs.image_tag }}
        run: |
          if [ -z "$AZURE_RESOURCE_GROUP" ]; then
            echo "AZURE_RESOURCE_GROUP repository variable is not set."
            exit 1
          fi

          az containerapp update \
            --name "${{ inputs.container_app_name }}" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "$IMAGE"

      - name: Show app URL
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          az containerapp show \
            --name "${{ inputs.container_app_name }}" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query properties.configuration.ingress.fqdn -o tsv
