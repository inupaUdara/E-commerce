name: User Service CI

on:
  push:
    branches: [main, develop]
    paths:
      - backend/user-service/**
      - .github/workflows/user-service.yml
      - .github/workflows/reusable-java-service-ci.yml
  pull_request:
    branches: [main]
    paths:
      - backend/user-service/**
      - .github/workflows/user-service.yml
      - .github/workflows/reusable-java-service-ci.yml
  workflow_dispatch:

jobs:
  ci:
    uses: ./.github/workflows/reusable-java-service-ci.yml
    with:
      service_name: user-service
      service_path: backend/user-service
      image_name: gocart-user-service
    secrets: inherit
